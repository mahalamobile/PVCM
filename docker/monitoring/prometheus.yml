global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: "pvcm_metrics"
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/bearer.token
    static_configs:
      - targets: [ "nginx:80" ]

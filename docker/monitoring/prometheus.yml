global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: "pvcm_app_health"
    metrics_path: /up
    static_configs:
      - targets: [ "nginx:80" ]

  - job_name: "pvcm_metrics"
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials: CHANGE_ME_WITH_API_BEARER_TOKEN
    static_configs:
      - targets: [ "nginx:80" ]
